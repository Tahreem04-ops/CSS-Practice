<!DOCTYPE html>
<html>
<head>
<title>Product Information</title>
<style>
body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            margin: 20px;
        }
h1 {
            text-align: center;
            color: darkblue;
        }
div {
            width: 350px;
            background-color: white;
            margin: 20px auto;
            padding: 20px;
            border: 2px solid #ccc;
            border-radius: 10px;
            box-shadow: 0 0 10px lightgray;
        }
 p {
            font-size: 18px;
            margin: 12px 0;
        }
span {
            font-weight: bold;
            color: darkblue;
      }

 mark {
            background-color: yellow;
            padding: 2px 5px;
     }

del {
            color: red;
        }

ins {
            color: green;
            text-decoration: none;
            font-weight: bold;
        }

small {
            color: gray;
        }
    </style>
</head>
<body>
    <h1>Mobile Phone</h1>
    <div>
        <p>Brand: <span>Samsung</span></p>
        <p>Price: <mark>$500</mark></p>
        <p>Old Price: <del>$600</del></p>
        <p>New Offer: <ins>$500</ins></p>
        <p><small>Offer valid until 31 December.</small></p>
    </div>
</body>
</html>
