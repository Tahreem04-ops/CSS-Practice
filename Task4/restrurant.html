<!DOCTYPE html>
<html>
<head>
<title>Restaurant Menu</title>
<style>
body {
            font-family: Arial, sans-serif;
            background-color: #fff8f0;
            margin: 20px;
        }
h1 {
            text-align: center;
            color: darkred;
        }

 h2 {
            color: brown;
        }
    hr {
            border: 1px solid #ccc;
        }
    ol {
            background-color: #ffe5d0;
            padding: 15px;
            border-radius: 8px;
        }
    li {
            margin: 8px 0;
        }
    dl {
            background-color: #fff0e6;
            padding: 15px;
            border-radius: 8px;
        }
    dt {
            margin-top: 10px;
            color: darkred;
        }
    dd {
            margin-left: 20px;
            color: #444;
        }
    strong {
            color: darkred;
        }
    em {
            color: brown;
        }
    </style>
</head>
<body>
    <h1>Restaurant Menu</h1>
    <hr>
    <h2>Top 3 Dishes</h2>
    <ol>
        <li>Pizza</li>
        <li>Burger</li>
        <li>Pasta</li>
    </ol>
    <h2>Menu Details</h2>
<dl>
        <dt><strong>Pizza</strong></dt>
        <dd><em>Cheesy pizza with fresh vegetables.</em></dd>
        <dt><strong>Burger</strong></dt>
        <dd><em>Chicken burger served with fries.</em></dd>
        <dt><strong>Pasta</strong></dt>
        <dd><em>Creamy white sauce pasta.</em></dd>
</dl>

</body>
</html>
