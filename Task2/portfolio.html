<!DOCTYPE html>
<html>
<head>
<title>My Portfolio</title>
<style>
body {
            font-family: Arial, sans-serif;
            margin: 0;
            background-color: #f4f4f4;
        }

 header {
            background-color: darkblue;
            color: white;
            text-align: center;
            padding: 20px;
        }

 nav {
            background-color: #333;
            text-align: center;
            padding: 10px;
        }

nav a {
            color: white;
            text-decoration: none;
            margin: 15px;
            font-weight: bold;
        }
nav a:hover {
            color: yellow;
        }

section {
            background-color: white;
            width: 80%;
            margin: 20px auto;
            padding: 20px;
            border-radius: 10px;
        }

 img {
            display: block;
            margin: 10px auto;
            border-radius: 50%;
            border: 3px solid darkblue;
        }

        h2 {
            color: darkblue;
        }

        ul {
            padding-left: 20px;
        }
footer {
            background-color: darkblue;
            color: white;
            text-align: center;
            padding: 15px;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <header>
        <h1>My Portfolio</h1>
    </header>
    <nav>
        <a href="#">Home</a>
        <a href="#">About</a>
        <a href="#">Contact</a>
    </nav>
<section>
        <h2>About Me</h2>
        <img src="profile.jpg" alt="Profile Picture" width="150">
        <p>Hello! My name is Tahreem. I am learning HTML and CSS.</p>
    </section>
<section>
        <h2>My Skills</h2>
        <ul>
            <li>HTML</li>
            <li>CSS</li>
            <li>JavaScript</li>
        </ul>
    </section>
    <footer>
        <p>2026 My Portfolio</p>
    </footer>
</body>
</html>
